<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anúncios Meli — VenForce</title>

  <!-- CSS global do portal (sidebar / layout compartilhado) -->
  <link rel="stylesheet" href="style.css" />
  <!-- CSS próprio do módulo (todas as classes com prefixo .am-) -->
  <link rel="stylesheet" href="anuncios-meli.css" />
</head>
<body>
  <!--
    ATENÇÃO (único ajuste manual possível):
    O layout.js monta a sidebar compartilhada. Se a sidebar não aparecer
    igual às outras telas, abra a ads.html, copie o esqueleto do <body>
    (a div/main que envolve o conteúdo) e cole a <main id="am-conteudo">
    abaixo no lugar do conteúdo dela. O bloco .am-page é autossuficiente
    e funciona dentro de qualquer wrapper.
  -->
  <main id="am-conteudo" class="am-main">
    <div class="am-page" id="am-page">

      <!-- ============================================================
           VIEW 1 — Seleção de cliente
           ============================================================ -->
      <section id="am-view-clientes">
        <div class="am-head">
          <h1>Anúncios Meli</h1>
          <p>Escolha um cliente para visualizar, sincronizar e otimizar os anúncios do Mercado Livre.</p>
        </div>

        <div class="am-clientes-bar">
          <input type="text" id="am-busca-cliente" class="am-input"
                 placeholder="Buscar cliente..." autocomplete="off" />
        </div>

        <div id="am-clientes-container">
          <div class="am-state">
            <div class="am-spinner"></div>
            Carregando clientes...
          </div>
        </div>
      </section>

      <!-- ============================================================
           VIEW 2 — HUD do cliente
           ============================================================ -->
      <section id="am-view-hud" class="am-hidden">
        <div class="am-head">
          <button class="am-btn am-btn--ghost am-btn--sm" id="am-voltar">&larr; Trocar cliente</button>
        </div>

        <div class="am-hud-top" id="am-hud-top"></div>

        <div class="am-resumo" id="am-resumo"></div>

        <div class="am-filtros">
          <input type="text" id="am-busca" class="am-input"
                 placeholder="Buscar por título, MLB ou SKU..." autocomplete="off" />
          <select id="am-filtro-status" class="am-select">
            <option value="">Todos os status</option>
            <option value="active">Ativos</option>
            <option value="paused">Pausados</option>
            <option value="closed">Encerrados</option>
          </select>
          <select id="am-filtro-problema" class="am-select">
            <option value="">Todos os anúncios</option>
            <option value="score_baixo">Score baixo</option>
            <option value="sem_fotos">Fotos insuficientes</option>
            <option value="sem_sku">Sem SKU</option>
            <option value="ficha_incompleta">Ficha incompleta</option>
            <option value="pausados">Apenas pausados</option>
          </select>
        </div>

        <div id="am-catalogo-container"></div>
      </section>

    </div>
  </main>

  <!-- Layout/sidebar compartilhado -->
  <script src="layout.js"></script>
  <!-- Lógica do módulo -->
  <script src="anuncios-meli.js"></script>
</body>
</html>
